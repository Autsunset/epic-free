name: Lint & Test

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Ruff (lint)
        run: uv run ruff check

      - name: Black (format check)
        run: uv run black --check . -l 100

      # Tests must pass without network access (see CLAUDE.md).
      - name: Pytest
        run: uv run pytest --cov=epic_free --cov-report=term-missing
