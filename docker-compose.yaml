name: epic-free

services:
  epic-free:
    # Published by .github/workflows/docker.yml. Forks: change this to your own GHCR path.
    image: ghcr.io/autsunset/epic-free:latest
    restart: always
    container_name: epic-free

    environment:
      - TZ=Asia/Shanghai

      # ----------------------------------------
      # Epic account
      # ----------------------------------------
      - EPIC_EMAIL=your_email@example.com
      - EPIC_PASSWORD=your_password

      # ----------------------------------------
      # LLM provider — pick ONE: gemini | glm | openai
      # ----------------------------------------
      - LLM_PROVIDER=openai
      - OPENAI_API_KEY=sk-xxxxxxxxxxxxxxxxxxxxxxxx
      - OPENAI_BASE_URL=https://api.openai.com/v1
      - OPENAI_MODEL=gpt-4.1-mini

      # Switch to GLM (ZhipuAI) instead:
      # - LLM_PROVIDER=glm
      # - GLM_API_KEY=your_glm_api_key
      # - GLM_BASE_URL=https://open.bigmodel.cn/api/paas/v4
      # - GLM_MODEL=glm-4.5v

      # Switch to Gemini / AiHubMix instead:
      # - LLM_PROVIDER=gemini
      # - GEMINI_API_KEY=your_gemini_api_key
      # - GEMINI_BASE_URL=
      # - GEMINI_MODEL=gemini-2.5-pro

      # ----------------------------------------
      # Runtime
      # ----------------------------------------
      - BROWSER_BACKEND=auto
      - ENABLE_APSCHEDULER=true

      # ----------------------------------------
      # Advanced tuning (optional)
      # All of the following are real fields inherited from hcaptcha-challenger's
      # AgentConfig — uncomment and adjust as needed.
      # ----------------------------------------
      # - DISABLE_BEZIER_TRAJECTORY=false
      # - EXECUTION_TIMEOUT=120            # seconds, per-step hard limit
      # - RESPONSE_TIMEOUT=30              # seconds, LLM HTTP response wait
      # - RETRY_ON_FAILURE=true
      # - WAIT_FOR_CHALLENGE_VIEW_TO_RENDER_MS=1500
      #
      # Per-task model overrides — leave empty to follow the provider's default
      # model set above (OPENAI_MODEL / GLM_MODEL / GEMINI_MODEL).
      # - CHALLENGE_CLASSIFIER_MODEL=
      # - IMAGE_CLASSIFIER_MODEL=
      # - SPATIAL_POINT_REASONER_MODEL=
      # - SPATIAL_PATH_REASONER_MODEL=
      #
      # NOTE: the upstream docker-compose also lists CONSTRAINT_RESPONSE_SCHEMA and
      # *_THINKING_BUDGET (IMAGE_CLASSIFIER_THINKING_BUDGET, SPatial_*). These are
      # NOT fields in the current hcaptcha-challenger AgentConfig, so they are
      # silently ignored (settings use extra="ignore") — they have no effect here
      # nor in the original project.

    volumes:
      - "./volumes/:/app/volumes/"

    mem_limit: 4g
    shm_size: 2gb
